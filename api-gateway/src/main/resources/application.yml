server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      default-filters:
        - AddRequestHeader=X-Gateway-Source, arena-gamer-gateway
        - AddResponseHeader=X-Response-Gateway, arena-gamer-platform
      routes:
        - id: user-service
          uri: ${USER_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/users/**
          filters:
            - AddRequestHeader=X-Service-Name, user-service

        - id: station-service
          uri: ${STATION_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/stations/**
          filters:
            - AddRequestHeader=X-Service-Name, station-service

        - id: session-service
          uri: ${SESSION_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/sessions/**
          filters:
            - AddRequestHeader=X-Service-Name, session-service

        - id: arena-inventory
          uri: ${INVENTORY_SERVICE_URL:http://localhost:9001}
          predicates:
            - Path=/api/v1/productos/**
          filters:
            - AddRequestHeader=X-Service-Name, arena-inventory

        - id: arena-reservas
          uri: ${RESERVAS_SERVICE_URL:http://localhost:9000}
          predicates:
            - Path=/api/v1/reservas/**
          filters:
            - AddRequestHeader=X-Service-Name, arena-reservas

        - id: arena-wallet
          uri: ${WALLET_SERVICE_URL:http://localhost:8085}
          predicates:
            - Path=/api/v1/billeteras/**
          filters:
            - AddRequestHeader=X-Service-Name, arena-wallet

        - id: loyalty-service
          uri: ${LOYALTY_SERVICE_URL:http://localhost:8087}
          predicates:
            - Path=/api/v1/loyalty/**
          filters:
            - AddRequestHeader=X-Service-Name, loyalty-service

        - id: hardware-monitor
          uri: ${HARDWARE_SERVICE_URL:http://localhost:8090}
          predicates:
            - Path=/api/v1/hardware/**
          filters:
            - AddRequestHeader=X-Service-Name, hardware-monitor

        - id: notification-service
          uri: ${NOTIFICATION_SERVICE_URL:http://localhost:8089}
          predicates:
            - Path=/api/v1/notifications/**
          filters:
            - AddRequestHeader=X-Service-Name, notification-service

        - id: tournament-service
          uri: ${TOURNAMENT_SERVICE_URL:http://localhost:8088}
          predicates:
            - Path=/api/v1/tournaments/**
          filters:
            - AddRequestHeader=X-Service-Name, tournament-service

logging:
  level:
    org.springframework.cloud.gateway: INFO