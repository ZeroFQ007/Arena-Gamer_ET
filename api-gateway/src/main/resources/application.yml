server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/users/**

        - id: station-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/stations/**

        - id: session-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/sessions/**

        - id: arena-inventory
          uri: http://localhost:9001
          predicates:
            - Path=/api/v1/productos/**

        - id: arena-reservas
          uri: http://localhost:9000
          predicates:
            - Path=/api/v1/reservas/**

        - id: arena-wallet
          uri: http://localhost:8085
          predicates:
            - Path=/api/v1/billeteras/**

        - id: loyalty-service
          uri: http://localhost:8087
          predicates:
            - Path=/api/v1/loyalty/**

        - id: hardware-monitor
          uri: http://localhost:8090
          predicates:
            - Path=/api/v1/hardware/**

        - id: notification-service
          uri: http://localhost:8089
          predicates:
            - Path=/api/v1/notifications/**

        - id: tournament-service
          uri: http://localhost:8088
          predicates:
            - Path=/api/v1/tournaments/**

logging:
  level:
    org.springframework.cloud.gateway: INFO