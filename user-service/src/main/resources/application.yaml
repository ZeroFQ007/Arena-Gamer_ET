git pull origin mainserver:
  port: 8081

spring:
  application:
    name: user-service
  datasource:
    url: jdbc:h2:mem:db_users
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
  h2:
    console:
      enabled: true
      path: /h2-console

services:
  notification-service:
    url: http://localhost:8089