spring:
  application:
    name: tournament-service
  datasource:
    url: jdbc:h2:mem:tournamentdb
    driverClassName: org.h2.Driver
    username: sa
    password: password
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
  h2:
    console:
      enabled: true
  cloud:
    openfeign:
      circuitbreaker:
        enabled: true
      client:
        config:
          default:
            connect-timeout: 5000
            read-timeout: 5000

server:
  port: 8088

user:
  service:
    url: http://localhost:8081
