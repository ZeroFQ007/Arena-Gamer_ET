services:
  mysql:
    image: mysql:8.4
    container_name: arena-gamer-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: arena_gamer_db
      MYSQL_USER: arena
      MYSQL_PASSWORD: arena123
      MYSQL_ROOT_PASSWORD: root123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: